<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 3D Smart House</title>
  <style>
    :root {
      --panel-bg: rgba(8, 13, 25, 0.68);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #eef5ff;
      --muted: #b7c3d7;
      --accent: #72e7ff;
      --accent2: #ffd36e;
      --danger: #ff7a9c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at top, #26375f 0%, #101624 42%, #06080e 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    canvas { display: block; }

    #hud {
      position: fixed;
      top: 18px;
      left: 18px;
      width: min(360px, calc(100vw - 36px));
      padding: 16px 16px 14px;
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.34);
      user-select: none;
    }

    #hud h1 {
      margin: 0 0 6px;
      font-size: 18px;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    #hud p {
      margin: 0 0 12px;
      font-size: 12.5px;
      line-height: 1.55;
      color: var(--muted);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 12px;
      padding: 10px 10px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(114, 231, 255, 0.62);
      background: linear-gradient(180deg, rgba(114,231,255,0.20), rgba(255,255,255,0.06));
    }

    button.active {
      border-color: rgba(255, 211, 110, 0.76);
      box-shadow: 0 0 24px rgba(255, 211, 110, 0.18) inset;
    }

    #status {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .pill {
      padding: 6px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      font-size: 11px;
      color: var(--muted);
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: min(760px, calc(100vw - 36px));
      padding: 11px 14px;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: rgba(8, 13, 25, 0.56);
      backdrop-filter: blur(14px);
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      box-shadow: 0 14px 44px rgba(0,0,0,0.26);
      user-select: none;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #06080e;
      color: white;
      z-index: 99;
      transition: opacity 450ms ease;
    }

    #loader.hide { opacity: 0; pointer-events: none; }

    .loader-card {
      width: min(420px, calc(100vw - 40px));
      padding: 24px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.36);
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.1);
      margin-top: 16px;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #72e7ff, #ffd36e, #ff7a9c);
      border-radius: inherit;
      animation: loading 1.7s ease-in-out forwards;
    }

    @keyframes loading {
      0% { width: 0%; }
      55% { width: 78%; }
      100% { width: 100%; }
    }

    @media (max-width: 640px) {
      #hud {
        top: 10px;
        left: 10px;
        width: calc(100vw - 20px);
        padding: 13px;
      }

      #hint {
        bottom: 10px;
        border-radius: 18px;
      }

      .buttons {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-card">
      <strong>3D House 로딩 중</strong>
      <div style="margin-top:8px;color:#b7c3d7;font-size:13px;">브라우저에서 실시간 3D 장면을 구성하고 있습니다.</div>
      <div class="bar"><span></span></div>
    </div>
  </div>

  <section id="hud">
    <h1>Interactive 3D Smart House</h1>
    <p>
      마우스로 회전·확대하고, 오브젝트를 클릭해 상호작용하세요.
      <br />W/A/S/D 이동, Q/E 높이 조절, R 카메라 리셋.
    </p>
    <div class="buttons">
      <button id="btnDayNight">🌙 밤 모드</button>
      <button id="btnAutoTour">🎥 자동 투어</button>
      <button id="btnDoor">🚪 문 열기</button>
      <button id="btnLights">💡 실내 조명</button>
      <button id="btnRoof">🏠 지붕 투명화</button>
      <button id="btnReset">↺ 리셋</button>
    </div>
    <div id="status">
      <span class="pill" id="pillMode">낮 모드</span>
      <span class="pill" id="pillDoor">문 닫힘</span>
      <span class="pill" id="pillLights">조명 꺼짐</span>
    </div>
  </section>

  <div id="hint">
    클릭 가능: 현관문, 창문, 태양광 패널, 수영장, 가로등 · 드래그: 시점 회전 · 휠: 확대/축소
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x8cb7ff, 0.018);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 240);
    camera.position.set(16, 10, 18);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2.2, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.055;
    controls.maxPolarAngle = Math.PI * 0.48;
    controls.minDistance = 7;
    controls.maxDistance = 55;

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const clock = new THREE.Clock();

    const state = {
      night: false,
      autoTour: false,
      doorOpen: false,
      lightsOn: false,
      roofTransparent: false,
      poolGlow: false,
      solarTilted: false,
      lampBoost: false,
      windowGlow: false
    };

    const clickable = [];
    const animated = [];
    const keys = new Set();

    const palette = {
      grass: 0x2e8d5c,
      grassDark: 0x176444,
      path: 0xc8b28c,
      wall: 0xf0e0c9,
      wallTrim: 0xe7c5a0,
      roof: 0x3b4058,
      roofEdge: 0x262b3e,
      wood: 0x8a4d2a,
      glass: 0x79d5ff,
      metal: 0x8694a8,
      darkMetal: 0x263044,
      lightWarm: 0xffd36e,
      accent: 0x72e7ff,
      stone: 0xb7b2a6,
      water: 0x2fc7ff
    };

    function mat(color, opts = {}) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness: opts.roughness ?? 0.58,
        metalness: opts.metalness ?? 0.04,
        transparent: opts.transparent ?? false,
        opacity: opts.opacity ?? 1,
        emissive: opts.emissive ?? 0x000000,
        emissiveIntensity: opts.emissiveIntensity ?? 0,
        side: opts.side ?? THREE.FrontSide
      });
    }

    const materials = {
      grass: mat(palette.grass, { roughness: 0.9 }),
      grassDark: mat(palette.grassDark, { roughness: 0.95 }),
      wall: mat(palette.wall, { roughness: 0.72 }),
      trim: mat(palette.wallTrim, { roughness: 0.62 }),
      roof: mat(palette.roof, { roughness: 0.5, metalness: 0.03 }),
      roofGlass: mat(palette.roof, { roughness: 0.28, transparent: true, opacity: 0.38 }),
      wood: mat(palette.wood, { roughness: 0.5 }),
      glass: mat(palette.glass, { roughness: 0.12, metalness: 0.0, transparent: true, opacity: 0.42, emissive: 0x1a6b88, emissiveIntensity: 0.15 }),
      glassLit: mat(palette.glass, { roughness: 0.06, transparent: true, opacity: 0.72, emissive: 0xffcf70, emissiveIntensity: 0.9 }),
      path: mat(palette.path, { roughness: 0.8 }),
      stone: mat(palette.stone, { roughness: 0.82 }),
      metal: mat(palette.metal, { roughness: 0.35, metalness: 0.45 }),
      darkMetal: mat(palette.darkMetal, { roughness: 0.38, metalness: 0.52 }),
      solar: mat(0x101729, { roughness: 0.22, metalness: 0.58, emissive: 0x0a2d5b, emissiveIntensity: 0.25 }),
      water: mat(palette.water, { roughness: 0.1, metalness: 0, transparent: true, opacity: 0.62, emissive: 0x066d9c, emissiveIntensity: 0.22 }),
      light: mat(0xfff1b8, { roughness: 0.2, emissive: 0xffd36e, emissiveIntensity: 1.25 }),
      black: mat(0x10131e, { roughness: 0.6 }),
      white: mat(0xffffff, { roughness: 0.42 }),
      red: mat(0xff6688, { roughness: 0.42, emissive: 0x44111c, emissiveIntensity: 0.15 })
    };

    function addMesh(parent, geometry, material, position = [0,0,0], rotation = [0,0,0], scale = [1,1,1], cast = true, receive = true) {
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(...position);
      mesh.rotation.set(...rotation);
      mesh.scale.set(...scale);
      mesh.castShadow = cast;
      mesh.receiveShadow = receive;
      parent.add(mesh);
      return mesh;
    }

    function roundedBox(width, height, depth, radius = 0.08, smoothness = 3) {
      // Uses normal box geometry for compatibility; bevel-like effect is approximated with trims.
      return new THREE.BoxGeometry(width, height, depth, 1, 1, 1);
    }

    // Environment
    const ground = addMesh(
      scene,
      new THREE.CircleGeometry(42, 96),
      materials.grass,
      [0, -0.03, 0],
      [-Math.PI / 2, 0, 0],
      [1, 1, 1],
      false,
      true
    );

    const lawnRing = addMesh(
      scene,
      new THREE.RingGeometry(25, 42, 128),
      materials.grassDark,
      [0, -0.025, 0],
      [-Math.PI / 2, 0, 0],
      [1, 1, 1],
      false,
      true
    );

    const driveway = addMesh(scene, new THREE.BoxGeometry(6, 0.08, 21), materials.path, [0, 0.02, 13.2], [0, 0, 0], [1, 1, 1], false, true);
    const frontPath = addMesh(scene, new THREE.BoxGeometry(3.2, 0.09, 7), materials.path, [0, 0.04, 4.9], [0, 0, 0], [1, 1, 1], false, true);

    // Stepping stones
    for (let i = 0; i < 7; i++) {
      addMesh(
        scene,
        new THREE.CylinderGeometry(0.62, 0.72, 0.08, 18),
        materials.stone,
        [Math.sin(i * 0.8) * 0.25, 0.1, 2.2 + i * 0.72],
        [0, 0, 0],
        [1, 1, 0.74],
        false,
        true
      );
    }

    // Main house group
    const house = new THREE.Group();
    scene.add(house);

    const base = addMesh(house, roundedBox(10.4, 0.45, 8.4), materials.stone, [0, 0.22, 0], [0,0,0]);
    const firstFloor = addMesh(house, roundedBox(9.4, 4.4, 7.2), materials.wall, [0, 2.45, 0], [0,0,0]);
    const secondFloor = addMesh(house, roundedBox(7.4, 3.6, 5.6), materials.wall, [0.6, 6.35, -0.45], [0,0,0]);

    // Architectural trims
    addMesh(house, new THREE.BoxGeometry(10.2, 0.22, 7.8), materials.trim, [0, 4.72, 0], [0,0,0]);
    addMesh(house, new THREE.BoxGeometry(8.0, 0.2, 6.0), materials.trim, [0.6, 8.25, -0.45], [0,0,0]);
    addMesh(house, new THREE.BoxGeometry(10.8, 0.18, 8.8), materials.darkMetal, [0, 0.55, 0], [0,0,0]);

    // Roofs
    const roofGroup = new THREE.Group();
    house.add(roofGroup);

    const roofShape = new THREE.Shape();
    roofShape.moveTo(-5.4, 0);
    roofShape.lineTo(0, 2.5);
    roofShape.lineTo(5.4, 0);
    roofShape.lineTo(-5.4, 0);

    const roofGeom = new THREE.ExtrudeGeometry(roofShape, { depth: 8.4, bevelEnabled: false });
    roofGeom.center();
    const mainRoof = addMesh(roofGroup, roofGeom, materials.roof, [0, 5.32, 0], [0, Math.PI / 2, 0], [1,1,1]);
    mainRoof.name = "지붕";

    const roofShape2 = new THREE.Shape();
    roofShape2.moveTo(-4.2, 0);
    roofShape2.lineTo(0, 2.15);
    roofShape2.lineTo(4.2, 0);
    roofShape2.lineTo(-4.2, 0);

    const roofGeom2 = new THREE.ExtrudeGeometry(roofShape2, { depth: 6.6, bevelEnabled: false });
    roofGeom2.center();
    const upperRoof = addMesh(roofGroup, roofGeom2, materials.roof, [0.6, 8.62, -0.45], [0, Math.PI / 2, 0], [1,1,1]);
    upperRoof.name = "상부 지붕";

    // Roof caps and ridge
    addMesh(roofGroup, new THREE.BoxGeometry(0.35, 0.35, 9.2), materials.roofEdge, [0, 7.78, 0], [0,0,0]);
    addMesh(roofGroup, new THREE.BoxGeometry(0.3, 0.3, 7.2), materials.roofEdge, [0.6, 10.78, -0.45], [0,0,0]);

    // Chimney
    const chimney = addMesh(house, new THREE.BoxGeometry(0.82, 2.8, 0.82), materials.darkMetal, [-3.2, 7.3, -2.4], [0, 0.2, 0]);
    const chimneyTop = addMesh(house, new THREE.BoxGeometry(1.12, 0.28, 1.12), materials.black, [-3.2, 8.82, -2.4], [0,0.2,0]);
    const smoke = [];
    for (let i = 0; i < 5; i++) {
      const puff = addMesh(
        scene,
        new THREE.SphereGeometry(0.22 + i * 0.04, 16, 12),
        mat(0xffffff, { transparent: true, opacity: 0.16 - i * 0.018, roughness: 0.9 }),
        [-3.2 + Math.sin(i) * 0.16, 9.2 + i * 0.52, -2.4 + Math.cos(i) * 0.14],
        [0,0,0],
        [1.35, 0.75, 1],
        false,
        false
      );
      smoke.push(puff);
      animated.push({ type: "smoke", mesh: puff, seed: i * 0.7 });
    }

    // Door pivot
    const doorPivot = new THREE.Group();
    doorPivot.position.set(-0.75, 0.55, 3.66);
    house.add(doorPivot);
    const door = addMesh(doorPivot, new THREE.BoxGeometry(1.5, 2.75, 0.18), materials.wood, [0.75, 1.38, 0], [0,0,0]);
    door.name = "현관문";
    door.userData.click = "door";
    clickable.push(door);

    const doorknob = addMesh(doorPivot, new THREE.SphereGeometry(0.08, 16, 12), materials.light, [1.25, 1.45, 0.13], [0,0,0]);
    const doorFrameTop = addMesh(house, new THREE.BoxGeometry(2.0, 0.18, 0.28), materials.darkMetal, [0, 3.38, 3.78], [0,0,0]);
    const doorFrameLeft = addMesh(house, new THREE.BoxGeometry(0.18, 2.95, 0.28), materials.darkMetal, [-0.86, 1.95, 3.78], [0,0,0]);
    const doorFrameRight = addMesh(house, new THREE.BoxGeometry(0.18, 2.95, 0.28), materials.darkMetal, [0.86, 1.95, 3.78], [0,0,0]);

    // Porch
    addMesh(house, new THREE.BoxGeometry(4.8, 0.24, 2.2), materials.stone, [0, 0.72, 4.45], [0,0,0]);
    addMesh(house, new THREE.BoxGeometry(5.2, 0.2, 2.5), materials.darkMetal, [0, 3.95, 4.45], [0,0,0]);
    for (const x of [-2.1, 2.1]) {
      addMesh(house, new THREE.CylinderGeometry(0.12, 0.16, 3.3, 18), materials.white, [x, 2.25, 4.65], [0,0,0]);
    }

    // Windows
    const windows = [];
    function addWindow(x, y, z, sx = 1.5, sy = 1.2, rotY = 0) {
      const group = new THREE.Group();
      group.position.set(x, y, z);
      group.rotation.y = rotY;
      house.add(group);

      const frame = addMesh(group, new THREE.BoxGeometry(sx + 0.22, sy + 0.22, 0.16), materials.darkMetal, [0,0,0], [0,0,0]);
      const glass = addMesh(group, new THREE.BoxGeometry(sx, sy, 0.18), materials.glass, [0,0,0.035], [0,0,0]);
      glass.name = "창문";
      glass.userData.click = "window";
      clickable.push(glass);
      windows.push(glass);

      addMesh(group, new THREE.BoxGeometry(0.07, sy + 0.08, 0.2), materials.darkMetal, [0,0,0.08], [0,0,0]);
      addMesh(group, new THREE.BoxGeometry(sx + 0.08, 0.07, 0.2), materials.darkMetal, [0,0,0.08], [0,0,0]);
      addMesh(group, new THREE.BoxGeometry(sx + 0.5, 0.14, 0.38), materials.trim, [0,-sy/2-0.2,0.02], [0,0,0]);

      return group;
    }

    addWindow(-3.15, 2.85, 3.68, 1.55, 1.18, 0);
    addWindow(3.15, 2.85, 3.68, 1.55, 1.18, 0);
    addWindow(-4.78, 2.8, -1.5, 1.25, 1.15, Math.PI / 2);
    addWindow(4.78, 2.8, -1.5, 1.25, 1.15, -Math.PI / 2);
    addWindow(-1.6, 6.8, 2.42, 1.25, 1.05, 0);
    addWindow(2.2, 6.8, 2.42, 1.25, 1.05, 0);
    addWindow(4.34, 6.75, -0.6, 1.1, 1.0, -Math.PI / 2);

    // Balcony
    const balcony = new THREE.Group();
    balcony.position.set(0.6, 5.55, 3.2);
    house.add(balcony);
    addMesh(balcony, new THREE.BoxGeometry(4.8, 0.24, 1.5), materials.darkMetal, [0,0,0], [0,0,0]);
    for (let i = -5; i <= 5; i++) {
      addMesh(balcony, new THREE.CylinderGeometry(0.035, 0.035, 1.0, 10), materials.metal, [i * 0.42, 0.62, 0.68], [0,0,0]);
    }
    addMesh(balcony, new THREE.BoxGeometry(4.9, 0.09, 0.12), materials.metal, [0, 1.14, 0.68], [0,0,0]);

    // Solar panels
    const solarGroup = new THREE.Group();
    solarGroup.position.set(2.7, 7.36, -1.2);
    solarGroup.rotation.set(-0.45, 0, 0);
    house.add(solarGroup);

    for (let r = 0; r < 2; r++) {
      for (let c = 0; c < 3; c++) {
        const panel = addMesh(solarGroup, new THREE.BoxGeometry(1.1, 0.06, 0.78), materials.solar, [(c - 1) * 1.18, 0.04, (r - 0.5) * 0.86], [0,0,0]);
        panel.name = "태양광 패널";
        panel.userData.click = "solar";
        clickable.push(panel);
        addMesh(solarGroup, new THREE.BoxGeometry(1.12, 0.075, 0.035), materials.accentLine ?? materials.metal, [(c - 1) * 1.18, 0.08, (r - 0.5) * 0.86], [0,0,0]);
      }
    }

    // Garage/carport
    const garage = new THREE.Group();
    garage.position.set(-7.0, 0.0, 0.2);
    scene.add(garage);
    addMesh(garage, new THREE.BoxGeometry(5.4, 3.2, 5.4), materials.wall, [0,1.75,0], [0,0,0]);
    addMesh(garage, new THREE.BoxGeometry(5.8, 0.36, 5.9), materials.roof, [0,3.55,0], [0,0.12,0]);
    addMesh(garage, new THREE.BoxGeometry(4.2, 2.2, 0.18), materials.darkMetal, [0,1.55,2.78], [0,0,0]);
    for (let i = -2; i <= 2; i++) {
      addMesh(garage, new THREE.BoxGeometry(0.05, 2.1, 0.2), materials.metal, [i * 0.75,1.55,2.9], [0,0,0]);
    }

    // Minimal car
    const car = new THREE.Group();
    car.position.set(-7, 0.5, 9.5);
    scene.add(car);
    addMesh(car, new THREE.BoxGeometry(3.2, 0.8, 5.0), materials.red, [0,0.55,0], [0,0,0]);
    addMesh(car, new THREE.BoxGeometry(2.35, 0.8, 2.6), materials.glass, [0,1.25,-0.25], [0,0,0]);
    for (const x of [-1.72, 1.72]) {
      for (const z of [-1.65, 1.65]) {
        addMesh(car, new THREE.CylinderGeometry(0.42, 0.42, 0.28, 24), materials.black, [x,0.25,z], [Math.PI/2,0,0]);
        addMesh(car, new THREE.CylinderGeometry(0.22, 0.22, 0.3, 24), materials.metal, [x,0.25,z], [Math.PI/2,0,0]);
      }
    }
    addMesh(car, new THREE.BoxGeometry(0.85, 0.18, 0.08), materials.light, [-0.8,0.7,-2.55], [0,0,0]);
    addMesh(car, new THREE.BoxGeometry(0.85, 0.18, 0.08), materials.light, [0.8,0.7,-2.55], [0,0,0]);

    // Pool
    const poolGroup = new THREE.Group();
    poolGroup.position.set(9.6, 0.0, -6.0);
    scene.add(poolGroup);
    addMesh(poolGroup, new THREE.BoxGeometry(7.2, 0.35, 4.4), materials.stone, [0,0.14,0], [0,0,0]);
    const poolWater = addMesh(poolGroup, new THREE.BoxGeometry(6.6, 0.12, 3.8), materials.water, [0,0.38,0], [0,0,0], [1,1,1], false, true);
    poolWater.name = "수영장";
    poolWater.userData.click = "pool";
    clickable.push(poolWater);
    animated.push({ type: "water", mesh: poolWater, seed: 1.1 });

    // Patio furniture
    const table = new THREE.Group();
    table.position.set(8.5, 0.2, 2.5);
    scene.add(table);
    addMesh(table, new THREE.CylinderGeometry(0.78, 0.78, 0.08, 32), materials.wood, [0,0.95,0], [0,0,0]);
    addMesh(table, new THREE.CylinderGeometry(0.08, 0.1, 0.9, 16), materials.metal, [0,0.48,0], [0,0,0]);
    for (let i = 0; i < 4; i++) {
      const chair = new THREE.Group();
      const angle = i * Math.PI / 2;
      chair.position.set(Math.cos(angle) * 1.45, 0.05, Math.sin(angle) * 1.45);
      chair.rotation.y = -angle;
      table.add(chair);
      addMesh(chair, new THREE.BoxGeometry(0.75,0.12,0.75), materials.wood, [0,0.45,0], [0,0,0]);
      addMesh(chair, new THREE.BoxGeometry(0.75,0.9,0.12), materials.wood, [0,0.9,0.38], [0,0,0]);
    }

    // Trees and shrubs
    function addTree(x, z, scale = 1) {
      const tree = new THREE.Group();
      tree.position.set(x, 0, z);
      tree.scale.setScalar(scale);
      scene.add(tree);
      addMesh(tree, new THREE.CylinderGeometry(0.18, 0.24, 1.6, 12), materials.wood, [0,0.82,0], [0,0,0]);
      const leaves1 = addMesh(tree, new THREE.ConeGeometry(0.95, 1.9, 18), materials.grassDark, [0,2.0,0], [0,0,0]);
      const leaves2 = addMesh(tree, new THREE.ConeGeometry(0.78, 1.55, 18), materials.grass, [0,2.7,0], [0,0,0]);
      animated.push({ type: "tree", mesh: leaves1, seed: x * 0.17 + z * 0.11 });
      animated.push({ type: "tree", mesh: leaves2, seed: x * 0.13 - z * 0.07 });
    }

    [
      [-14,-12,1.45], [-18,1,1.2], [15,12,1.35], [18,-2,1.1],
      [-12,13,1.0], [12,-16,1.6], [-21,-8,1.1], [21,6,1.28],
      [5,-22,1.15], [-7,-20,1.35]
    ].forEach(([x,z,s]) => addTree(x,z,s));

    for (let i = 0; i < 28; i++) {
      const a = i * 0.7;
      const r = 10 + (i % 7) * 2.8;
      addMesh(
        scene,
        new THREE.SphereGeometry(0.35 + (i % 3) * 0.08, 12, 8),
        i % 2 ? materials.grassDark : materials.grass,
        [Math.cos(a) * r, 0.38, Math.sin(a) * r],
        [0,0,0],
        [1, 0.55, 1],
        true,
        true
      );
    }

    // Lights
    const ambient = new THREE.HemisphereLight(0xcde7ff, 0x304f32, 1.5);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xfff3cf, 3.4);
    sun.position.set(16, 22, 11);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 70;
    sun.shadow.camera.left = -30;
    sun.shadow.camera.right = 30;
    sun.shadow.camera.top = 30;
    sun.shadow.camera.bottom = -30;
    scene.add(sun);

    const moon = new THREE.DirectionalLight(0x8db6ff, 0.0);
    moon.position.set(-14, 18, -9);
    moon.castShadow = true;
    scene.add(moon);

    const indoorLights = [];
    function addPointLight(x, y, z, intensity = 0, distance = 8, color = 0xffd36e) {
      const light = new THREE.PointLight(color, intensity, distance, 2);
      light.castShadow = true;
      light.shadow.mapSize.set(512, 512);
      light.position.set(x, y, z);
      scene.add(light);
      indoorLights.push(light);
      return light;
    }

    addPointLight(-2.8, 3.0, 1.5, 0, 8);
    addPointLight(2.8, 3.0, 1.2, 0, 8);
    addPointLight(0.6, 7.0, -0.8, 0, 8);
    addPointLight(9.6, 0.75, -6.0, 0, 9, 0x38ceff);

    // Street lamps
    const lampLights = [];
    function addLamp(x, z) {
      const lamp = new THREE.Group();
      lamp.position.set(x, 0, z);
      scene.add(lamp);
      addMesh(lamp, new THREE.CylinderGeometry(0.06, 0.08, 3.2, 16), materials.darkMetal, [0,1.6,0], [0,0,0]);
      const bulb = addMesh(lamp, new THREE.SphereGeometry(0.23, 18, 12), materials.light, [0,3.28,0], [0,0,0]);
      bulb.name = "가로등";
      bulb.userData.click = "lamp";
      clickable.push(bulb);

      const light = new THREE.PointLight(0xffd36e, 0.4, 9, 2);
      light.position.set(x, 3.1, z);
      light.castShadow = true;
      light.shadow.mapSize.set(512, 512);
      scene.add(light);
      lampLights.push(light);
    }

    addLamp(-3.4, 7.0);
    addLamp(3.4, 7.0);
    addLamp(8.5, 1.0);
    addLamp(-9.7, 6.5);

    // Decorative particles/fireflies
    const firefliesGeo = new THREE.BufferGeometry();
    const fireflyCount = 80;
    const positions = new Float32Array(fireflyCount * 3);
    for (let i = 0; i < fireflyCount; i++) {
      positions[i * 3 + 0] = (Math.random() - 0.5) * 44;
      positions[i * 3 + 1] = 0.8 + Math.random() * 5.5;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 44;
    }
    firefliesGeo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    const firefliesMat = new THREE.PointsMaterial({
      color: 0xffe6a3,
      size: 0.08,
      transparent: true,
      opacity: 0,
      blending: THREE.AdditiveBlending
    });
    const fireflies = new THREE.Points(firefliesGeo, firefliesMat);
    scene.add(fireflies);

    // Sky objects
    const skyDome = addMesh(
      scene,
      new THREE.SphereGeometry(100, 48, 32),
      mat(0x9ed0ff, { side: THREE.BackSide, roughness: 1 }),
      [0,0,0],
      [0,0,0],
      [1,1,1],
      false,
      false
    );

    const sunSphere = addMesh(
      scene,
      new THREE.SphereGeometry(1.1, 32, 16),
      mat(0xffe08a, { emissive: 0xffc65c, emissiveIntensity: 1.8 }),
      [18, 20, -22],
      [0,0,0],
      [1,1,1],
      false,
      false
    );

    const moonSphere = addMesh(
      scene,
      new THREE.SphereGeometry(0.88, 32, 16),
      mat(0xcbd8ff, { emissive: 0x91acff, emissiveIntensity: 0.6 }),
      [-18, 20, 16],
      [0,0,0],
      [1,1,1],
      false,
      false
    );
    moonSphere.visible = false;

    // Stars
    const starGeo = new THREE.BufferGeometry();
    const starCount = 500;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const radius = 55 + Math.random() * 42;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(THREE.MathUtils.randFloatSpread(0.7));
      starPositions[i*3+0] = radius * Math.sin(phi) * Math.cos(theta);
      starPositions[i*3+1] = 18 + Math.abs(radius * Math.cos(phi));
      starPositions[i*3+2] = radius * Math.sin(phi) * Math.sin(theta);
    }
    starGeo.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0 });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // Interaction labels through cursor
    renderer.domElement.addEventListener("pointermove", (event) => {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickable, true);
      renderer.domElement.style.cursor = hits.length ? "pointer" : "grab";
    });

    renderer.domElement.addEventListener("pointerdown", () => {
      renderer.domElement.style.cursor = "grabbing";
    });

    renderer.domElement.addEventListener("pointerup", (event) => {
      renderer.domElement.style.cursor = "grab";
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickable, true);
      if (!hits.length) return;

      const type = hits[0].object.userData.click;
      if (type === "door") toggleDoor();
      if (type === "window") toggleLights();
      if (type === "solar") toggleSolar();
      if (type === "pool") togglePool();
      if (type === "lamp") toggleLampBoost();
    });

    window.addEventListener("keydown", (e) => {
      keys.add(e.key.toLowerCase());
      if (e.key.toLowerCase() === "r") resetCamera();
    });
    window.addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

    function setButton(id, active) {
      document.getElementById(id).classList.toggle("active", active);
    }

    function updateStatus() {
      document.getElementById("pillMode").textContent = state.night ? "밤 모드" : "낮 모드";
      document.getElementById("pillDoor").textContent = state.doorOpen ? "문 열림" : "문 닫힘";
      document.getElementById("pillLights").textContent = state.lightsOn ? "조명 켜짐" : "조명 꺼짐";
      document.getElementById("btnDayNight").textContent = state.night ? "☀️ 낮 모드" : "🌙 밤 모드";
      document.getElementById("btnDoor").textContent = state.doorOpen ? "🚪 문 닫기" : "🚪 문 열기";
      document.getElementById("btnLights").textContent = state.lightsOn ? "💡 조명 끄기" : "💡 실내 조명";
      document.getElementById("btnRoof").textContent = state.roofTransparent ? "🏠 지붕 복원" : "🏠 지붕 투명화";
      setButton("btnDayNight", state.night);
      setButton("btnAutoTour", state.autoTour);
      setButton("btnDoor", state.doorOpen);
      setButton("btnLights", state.lightsOn);
      setButton("btnRoof", state.roofTransparent);
    }

    function toggleDayNight() {
      state.night = !state.night;
      if (state.night) {
        renderer.setClearColor(0x070b16);
        scene.fog.color.set(0x111936);
        scene.fog.density = 0.024;
        skyDome.material.color.set(0x071126);
        sun.intensity = 0.08;
        moon.intensity = 1.3;
        ambient.intensity = 0.45;
        starMat.opacity = 0.88;
        firefliesMat.opacity = 0.85;
        sunSphere.visible = false;
        moonSphere.visible = true;
        lampLights.forEach(l => l.intensity = state.lampBoost ? 2.2 : 1.2);
        if (!state.lightsOn) {
          indoorLights.slice(0, 3).forEach(l => l.intensity = 0.9);
          windows.forEach(w => w.material = materials.glassLit);
        }
      } else {
        renderer.setClearColor(0x9ed0ff);
        scene.fog.color.set(0x8cb7ff);
        scene.fog.density = 0.018;
        skyDome.material.color.set(0x9ed0ff);
        sun.intensity = 3.4;
        moon.intensity = 0.0;
        ambient.intensity = 1.5;
        starMat.opacity = 0;
        firefliesMat.opacity = 0;
        sunSphere.visible = true;
        moonSphere.visible = false;
        lampLights.forEach(l => l.intensity = state.lampBoost ? 1.3 : 0.4);
        if (!state.lightsOn) {
          indoorLights.slice(0, 3).forEach(l => l.intensity = 0);
          windows.forEach(w => w.material = materials.glass);
        }
      }
      updateStatus();
    }

    function toggleDoor() {
      state.doorOpen = !state.doorOpen;
      updateStatus();
    }

    function toggleLights() {
      state.lightsOn = !state.lightsOn;
      indoorLights.slice(0, 3).forEach(l => l.intensity = state.lightsOn ? 1.8 : (state.night ? 0.9 : 0));
      windows.forEach(w => w.material = state.lightsOn || state.night ? materials.glassLit : materials.glass);
      updateStatus();
    }

    function toggleRoof() {
      state.roofTransparent = !state.roofTransparent;
      mainRoof.material = state.roofTransparent ? materials.roofGlass : materials.roof;
      upperRoof.material = state.roofTransparent ? materials.roofGlass : materials.roof;
      updateStatus();
    }

    function toggleSolar() {
      state.solarTilted = !state.solarTilted;
      solarGroup.userData.targetRotationX = state.solarTilted ? -0.15 : -0.45;
      solarGroup.userData.targetRotationZ = state.solarTilted ? 0.18 : 0;
    }

    function togglePool() {
      state.poolGlow = !state.poolGlow;
      indoorLights[3].intensity = state.poolGlow ? 2.0 : 0;
      poolWater.material.emissiveIntensity = state.poolGlow ? 1.05 : 0.22;
    }

    function toggleLampBoost() {
      state.lampBoost = !state.lampBoost;
      lampLights.forEach(l => l.intensity = state.lampBoost ? (state.night ? 2.2 : 1.3) : (state.night ? 1.2 : 0.4));
    }

    function resetCamera() {
      state.autoTour = false;
      camera.position.set(16, 10, 18);
      controls.target.set(0, 2.2, 0);
      controls.enableRotate = true;
      updateStatus();
    }

    document.getElementById("btnDayNight").addEventListener("click", toggleDayNight);
    document.getElementById("btnAutoTour").addEventListener("click", () => {
      state.autoTour = !state.autoTour;
      controls.enableRotate = !state.autoTour;
      updateStatus();
    });
    document.getElementById("btnDoor").addEventListener("click", toggleDoor);
    document.getElementById("btnLights").addEventListener("click", toggleLights);
    document.getElementById("btnRoof").addEventListener("click", toggleRoof);
    document.getElementById("btnReset").addEventListener("click", resetCamera);

    function updateKeyboard(delta) {
      const speed = keys.has("shift") ? 11 : 6;
      const move = new THREE.Vector3();
      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);
      forward.y = 0;
      forward.normalize();
      const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize().multiplyScalar(-1);

      if (keys.has("w")) move.add(forward);
      if (keys.has("s")) move.sub(forward);
      if (keys.has("a")) move.sub(right);
      if (keys.has("d")) move.add(right);
      if (keys.has("q")) move.y -= 1;
      if (keys.has("e")) move.y += 1;

      if (move.lengthSq() > 0) {
        move.normalize().multiplyScalar(speed * delta);
        camera.position.add(move);
        controls.target.add(move);
        state.autoTour = false;
        controls.enableRotate = true;
        updateStatus();
      }
    }

    function animate() {
      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();

      updateKeyboard(delta);

      // Door animation
      const targetDoor = state.doorOpen ? -Math.PI * 0.58 : 0;
      doorPivot.rotation.y = THREE.MathUtils.lerp(doorPivot.rotation.y, targetDoor, 0.09);

      // Solar panel animation
      const targetRX = solarGroup.userData.targetRotationX ?? -0.45;
      const targetRZ = solarGroup.userData.targetRotationZ ?? 0;
      solarGroup.rotation.x = THREE.MathUtils.lerp(solarGroup.rotation.x, targetRX, 0.06);
      solarGroup.rotation.z = THREE.MathUtils.lerp(solarGroup.rotation.z, targetRZ, 0.06);

      // Auto tour
      if (state.autoTour) {
        const radius = 22;
        camera.position.x = Math.cos(elapsed * 0.18) * radius;
        camera.position.z = Math.sin(elapsed * 0.18) * radius;
        camera.position.y = 9 + Math.sin(elapsed * 0.33) * 1.8;
        controls.target.set(0.4, 3.4, 0.2);
      }

      // Water shimmer
      poolWater.position.y = 0.38 + Math.sin(elapsed * 2.1) * 0.025;
      poolWater.scale.x = 1 + Math.sin(elapsed * 2.7) * 0.008;
      poolWater.scale.z = 1 + Math.cos(elapsed * 2.3) * 0.008;

      // Smoke, trees, particles
      for (const item of animated) {
        if (item.type === "smoke") {
          item.mesh.position.y += delta * (0.1 + item.seed * 0.02);
          item.mesh.position.x += Math.sin(elapsed + item.seed) * delta * 0.04;
          item.mesh.material.opacity = 0.12 + Math.sin(elapsed * 1.4 + item.seed) * 0.03;
          if (item.mesh.position.y > 12.2) {
            item.mesh.position.y = 9.15;
          }
        } else if (item.type === "tree") {
          item.mesh.rotation.z = Math.sin(elapsed * 1.15 + item.seed) * 0.025;
        }
      }

      const fireflyPositions = fireflies.geometry.attributes.position.array;
      for (let i = 0; i < fireflyCount; i++) {
        fireflyPositions[i * 3 + 1] += Math.sin(elapsed * 1.5 + i) * 0.0007;
        fireflyPositions[i * 3 + 0] += Math.sin(elapsed * 0.8 + i * 0.13) * 0.0009;
      }
      fireflies.geometry.attributes.position.needsUpdate = true;

      // Gentle house hover highlights
      windows.forEach((w, i) => {
        if (state.lightsOn || state.night) {
          w.material.emissiveIntensity = 0.75 + Math.sin(elapsed * 2.1 + i) * 0.12;
        }
      });

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener("resize", onResize);

    renderer.setClearColor(0x9ed0ff);
    updateStatus();

    setTimeout(() => {
      document.getElementById("loader").classList.add("hide");
    }, 1000);

    animate();
  </script>
</body>
</html>
